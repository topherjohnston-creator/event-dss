name: Fetch REFS & Build Timeline

on:
  schedule:
    # REFS cycles: 00Z, 06Z, 12Z, 18Z
    # Data available ~2 hours after cycle time
    # So fetch at: 02Z, 08Z, 14Z, 20Z
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    strategy:
      matrix:
        location: [krno, burning-man, reno-rodeo, nevada-state-fair, night-in-the-country]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env
        run: |
          echo "SYNOPTIC_TOKEN=${{ secrets.SYNOPTIC_TOKEN }}" >> .env
          echo "DEBUG=false" >> .env
      
      - name: Fetch REFS data from AWS S3
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          python scripts/fetch_refs_data.py
        timeout-minutes: 60
      
      - name: Extract hazards
        run: |
          python scripts/extract_hazards.py --location ${{ matrix.location }}
        timeout-minutes: 30
      
      - name: Build timeline (20 blocks × 3 hours)
        run: |
          python scripts/risk_engine.py --location ${{ matrix.location }}
        timeout-minutes: 10
      
      - name: Audit outputs
        run: |
          python scripts/audit.py --location ${{ matrix.location }} || true
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dss-output-${{ matrix.location }}
          path: |
            docs/
            data/debug/
          retention-days: 7
      
      - name: Commit and push
        if: matrix.location == 'krno'  # Only commit once per run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Event DSS forecasts - $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi

  notify:
    needs: [fetch-and-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack notification (optional)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Event DSS REFS fetch failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Event DSS REFS Fetch Failed*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
